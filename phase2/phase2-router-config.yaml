master_key: change_me_phase2
models:
  quality:
    api_base: http://127.0.0.1:8000/v1
    profile: quality
  fast:
    api_base: http://127.0.0.1:8001/v1
    profile: fast
default_model: fast
fallbacks:
  quality: [fast]
role_token_limits:
  viewer: 800
  admin: 4000
global_max_tokens: 4096
request_timeout_s: 2.0
concurrency_limit: 12
