groups:
  - name: llm-stack-critical
    rules:
      - alert: LlmRouterDown
        expr: up{job="phase2-router"} == 0
        for: 2m
        labels:
          severity: critical
          component: api
        annotations:
          summary: "Phase2 router is down"
          description: "No successful scrape for phase2-router in the last 2 minutes."

      - alert: RagApiDown
        expr: up{job="phase3-rag-api"} == 0
        for: 2m
        labels:
          severity: critical
          component: rag
        annotations:
          summary: "RAG API is down"
          description: "No successful scrape for phase3-rag-api in the last 2 minutes."

      - alert: UiProbeDown
        expr: probe_success{job="phase4-ui-blackbox"} == 0
        for: 3m
        labels:
          severity: critical
          component: ui
        annotations:
          summary: "UI probe failing"
          description: "Blackbox probe for phase4 UI is failing for 3 minutes."

  - name: llm-stack-slo
    rules:
      - alert: RouterErrorRateHigh
        expr: |
          (
            increase(llm_router_requests_error_total[5m])
            /
            clamp_min(increase(llm_router_requests_total[5m]), 1)
          ) * 100 > 2
        for: 10m
        labels:
          severity: warning
          component: api
        annotations:
          summary: "Router error rate above SLO"
          description: "5-minute error rate exceeded 2% for 10 minutes."

      - alert: RouterLatencyHigh
        expr: llm_router_latency_max_ms > 4000
        for: 10m
        labels:
          severity: warning
          component: api
        annotations:
          summary: "Router latency above SLO"
          description: "Observed max latency is above 4000ms for 10 minutes."

      - alert: BackupStale
        expr: time() - llm_backup_last_success_unixtime > 93600
        for: 30m
        labels:
          severity: critical
          component: backup
        annotations:
          summary: "Daily backup is stale"
          description: "No successful backup metric in the last 26 hours."
