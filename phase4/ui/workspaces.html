<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Workspaces - LLM Control Deck</title>
  <style>
    :root {
      --ink: #102131;
      --paper: #f4f1e7;
      --panel: #fffdf8;
      --accent: #0f4e67;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Space Grotesk", "IBM Plex Sans", "Segoe UI", sans-serif;
      color: var(--ink);
      background: radial-gradient(920px 420px at 100% -20%, #dff1ff, transparent), var(--paper);
    }
    main { max-width: 1100px; margin: 0 auto; padding: 1rem; }
    .card {
      background: var(--panel);
      border: 1px solid #00000020;
      border-radius: 14px;
      padding: .95rem;
      margin-bottom: .9rem;
      box-shadow: 0 10px 24px #00000010;
    }
    .meta { opacity: .78; font-size: .9rem; }
    .reason {
      margin-top: .35rem;
      font-size: .8rem;
      color: #31586c;
    }
    .toolbar {
      display: flex;
      gap: .55rem;
      flex-wrap: wrap;
      margin-top: .7rem;
    }
    input, button {
      border-radius: 9px;
      padding: .5rem .62rem;
      font: inherit;
      border: 1px solid #00000030;
    }
    button {
      border: 0;
      color: white;
      background: var(--accent);
      cursor: pointer;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: .88rem;
    }
    th, td {
      text-align: left;
      border-bottom: 1px solid #0000001d;
      padding: .45rem .38rem;
      vertical-align: top;
    }
    .mono {
      font-family: "IBM Plex Mono", Consolas, monospace;
      font-size: .8rem;
      word-break: break-all;
    }
    .sublist {
      margin: .15rem 0;
      padding-left: 1rem;
    }
    .sublist li { margin-bottom: .2rem; }
    .active {
      background: #eef8ff;
    }
    .rowBtn {
      border: 0;
      border-radius: 8px;
      background: #0f4e67;
      color: white;
      padding: .32rem .5rem;
      width: auto;
      cursor: pointer;
      font-size: .78rem;
    }
    tbody tr { cursor: pointer; }
  </style>
</head>
<body>
  <main>
    <section class="card">
      <h1>Workspace Uebersicht</h1>
      <p class="meta">Listet angelegte Workspaces und die zuletzt ausgefuehrten Chats pro Workspace. Datenquelle: browserseitiger Speicher.</p>
      <div class="toolbar">
        <input id="newWsName" placeholder="Workspace-Name" />
        <input id="newWsPath" placeholder="/pfad/zum/workspace" />
        <button id="addBtn" type="button">Workspace anlegen</button>
        <button id="reloadBtn" type="button">Neu laden</button>
      </div>
    </section>

    <section class="card">
      <h2>Aktueller Workspace</h2>
      <div id="currentWorkspaceBox" class="meta">Wird geladen...</div>
      <div id="currentWorkspaceReason" class="reason"></div>
      <ul id="currentWorkspaceChats" class="sublist"></ul>
    </section>

    <section class="card">
      <h2>Workspaces</h2>
      <table>
        <thead>
          <tr>
            <th>Aktion</th>
            <th>Name</th>
            <th>Pfad</th>
            <th>Letzte Nutzung</th>
            <th>Ausgefuehrte Chats</th>
          </tr>
        </thead>
        <tbody id="workspaceRows"></tbody>
      </table>
    </section>
  </main>

  <script>
    const WORKSPACES_KEY = 'llm-workspaces-v1';
    const ACTIVE_WORKSPACE_KEY = 'llm-active-workspace-v1';
    const CHAT_STORE_PREFIX = 'llm-controldeck-chats-v3';

    function loadWorkspaces() {
      try {
        const parsed = JSON.parse(localStorage.getItem(WORKSPACES_KEY) || '[]');
        if (Array.isArray(parsed)) return parsed;
      } catch {
        // ignore
      }
      return [];
    }

    function saveWorkspaces(items) {
      localStorage.setItem(WORKSPACES_KEY, JSON.stringify(items));
    }

    function fmtTs(ts) {
      if (!ts) return '-';
      const d = new Date(ts);
      return Number.isNaN(d.getTime()) ? ts : d.toLocaleString('de-DE');
    }

    function activeWorkspaceId() {
      try {
        return localStorage.getItem(ACTIVE_WORKSPACE_KEY) || '';
      } catch {
        return '';
      }
    }

    function setActiveWorkspaceId(id) {
      try {
        localStorage.setItem(ACTIVE_WORKSPACE_KEY, String(id || ''));
      } catch {
        // ignore storage errors
      }
    }

    function getWorkspaceChats(wsId) {
      if (!wsId) return [];
      const all = [];
      for (let i = 0; i < localStorage.length; i += 1) {
        const key = localStorage.key(i);
        if (!key || !key.startsWith(`${CHAT_STORE_PREFIX}:`) || !key.endsWith(`:${wsId}`)) {
          continue;
        }

        const user = key.slice(CHAT_STORE_PREFIX.length + 1).split(':')[0] || 'user';
        try {
          const parsed = JSON.parse(localStorage.getItem(key) || '{}');
          const chats = Array.isArray(parsed.chats) ? parsed.chats : [];
          chats.forEach((chat) => {
            all.push({
              user,
              title: chat?.title || chat?.id || '-',
              chatId: chat?.id || '-',
              updatedAt: chat?.updatedAt || '',
            });
          });
        } catch {
          // ignore bad payload
        }
      }

      return all.sort((a, b) => String(b.updatedAt || '').localeCompare(String(a.updatedAt || '')));
    }

    function renderCurrentWorkspace(workspaces) {
      let currentId = activeWorkspaceId();
      const box = document.getElementById('currentWorkspaceBox');
      const reason = document.getElementById('currentWorkspaceReason');
      const list = document.getElementById('currentWorkspaceChats');
      list.innerHTML = '';
      reason.textContent = '';

      if (!currentId && workspaces.length) {
        currentId = String(workspaces[0].id || '');
        reason.textContent = 'Hinweis: Kein aktiver Workspace-Key gefunden. Fallback auf den neuesten Workspace wurde gesetzt.';
      }

      const ws = workspaces.find((item) => String(item.id) === currentId) || workspaces[0] || null;
      if (!ws) {
        box.textContent = 'Kein aktiver Workspace gesetzt.';
        reason.textContent = 'Ursache: Es sind aktuell keine Workspaces in localStorage vorhanden.';
        return;
      }

      if (String(ws.id) !== currentId) {
        reason.textContent = 'Hinweis: Aktiver Workspace-Key war veraltet. Er wurde auf einen vorhandenen Workspace korrigiert.';
      }
      setActiveWorkspaceId(ws.id);

      box.innerHTML = `<strong>${ws.name || '-'}</strong> | <span class="mono">${ws.path || '-'}</span> | Letzte Nutzung: ${fmtTs(ws.lastUsedAt)}`;

      const chats = getWorkspaceChats(ws.id);
      if (!chats.length) {
        const li = document.createElement('li');
        li.textContent = 'Keine Chats fuer den aktuellen Workspace gefunden.';
        list.appendChild(li);
        return;
      }

      chats.slice(0, 30).forEach((item) => {
        const li = document.createElement('li');
        li.textContent = `${item.user} | ${item.title} | ${fmtTs(item.updatedAt)}`;
        list.appendChild(li);
      });
    }

    function render() {
      const rows = document.getElementById('workspaceRows');
      rows.innerHTML = '';
      const workspaces = loadWorkspaces().sort((a, b) => String(b.lastUsedAt || '').localeCompare(String(a.lastUsedAt || '')));
      const currentId = activeWorkspaceId();
      renderCurrentWorkspace(workspaces);

      if (!workspaces.length) {
        const tr = document.createElement('tr');
        tr.innerHTML = '<td colspan="5">Noch keine Workspaces angelegt.</td>';
        rows.appendChild(tr);
        return;
      }

      workspaces.forEach((ws) => {
        const chats = Array.isArray(ws.executedChats) ? ws.executedChats : [];
        const chatLines = chats.slice(0, 12).map((item) => `<li>${item.user || 'user'} | ${item.title || item.chatId || '-'} | ${fmtTs(item.updatedAt)}</li>`).join('');
        const tr = document.createElement('tr');
        if (String(ws.id) === currentId) {
          tr.className = 'active';
        }
        tr.innerHTML = `
          <td><button type="button" class="rowBtn" data-activate-id="${ws.id}">Aktivieren</button></td>
          <td>${ws.name || '-'}</td>
          <td class="mono">${ws.path || '-'}</td>
          <td>${fmtTs(ws.lastUsedAt)}</td>
          <td>${chats.length ? `<ul class="sublist">${chatLines}</ul>` : '-'}</td>
        `;
        tr.addEventListener('click', (ev) => {
          if (ev.target && ev.target.matches('button[data-activate-id]')) return;
          setActiveWorkspaceId(ws.id);
          ws.lastUsedAt = new Date().toISOString();
          saveWorkspaces(workspaces);
          render();
        });
        rows.appendChild(tr);
      });

      rows.querySelectorAll('button[data-activate-id]').forEach((btn) => {
        btn.addEventListener('click', (ev) => {
          ev.stopPropagation();
          const id = btn.getAttribute('data-activate-id') || '';
          if (!id) return;
          setActiveWorkspaceId(id);
          const ws = workspaces.find((item) => String(item.id) === String(id));
          if (ws) {
            ws.lastUsedAt = new Date().toISOString();
            saveWorkspaces(workspaces);
          }
          render();
        });
      });
    }

    function addWorkspace() {
      const name = (document.getElementById('newWsName').value || '').trim();
      const path = (document.getElementById('newWsPath').value || '').trim();
      if (!name || !path) return;

      const workspaces = loadWorkspaces();
      const existing = workspaces.find((ws) => String(ws.path || '').toLowerCase() === path.toLowerCase());
      if (existing) {
        existing.name = name;
        existing.lastUsedAt = new Date().toISOString();
        setActiveWorkspaceId(existing.id);
      } else {
        const created = {
          id: `ws-${Date.now()}-${Math.random().toString(16).slice(2, 8)}`,
          name,
          path,
          createdAt: new Date().toISOString(),
          lastUsedAt: new Date().toISOString(),
          projectHint: 'mim-llm',
          executedChats: [],
        };
        workspaces.unshift(created);
        setActiveWorkspaceId(created.id);
      }
      saveWorkspaces(workspaces);
      document.getElementById('newWsName').value = '';
      document.getElementById('newWsPath').value = '';
      render();
    }

    document.getElementById('addBtn').addEventListener('click', addWorkspace);
    document.getElementById('reloadBtn').addEventListener('click', render);
    render();
  </script>
</body>
</html>
