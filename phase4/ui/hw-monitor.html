<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HW Ueberwachung - LLM Control Deck</title>
  <style>
    :root {
      --ink: #102131;
      --paper: #f4f1e7;
      --panel: #fffdf8;
      --ok: #2f7a4f;
      --warn: #8b1e3f;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Space Grotesk", "IBM Plex Sans", "Segoe UI", sans-serif;
      color: var(--ink);
      background: radial-gradient(920px 420px at 100% -20%, #dff1ff, transparent), var(--paper);
    }
    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 1rem;
    }
    .card {
      background: var(--panel);
      border: 1px solid #00000020;
      border-radius: 14px;
      padding: .95rem;
      margin-bottom: .9rem;
      box-shadow: 0 10px 24px #00000010;
    }
    h1 { margin: 0 0 .35rem; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: .6rem;
    }
    .metric {
      border: 1px solid #00000022;
      border-radius: 10px;
      padding: .6rem;
      background: #fbfefb;
    }
    .k { font-size: .8rem; opacity: .75; }
    .v { font-size: 1.05rem; font-weight: 700; margin-top: .25rem; }
    .status.ok { color: var(--ok); }
    .status.warn { color: var(--warn); }
    button {
      border: 0;
      border-radius: 8px;
      padding: .5rem .68rem;
      color: white;
      background: #0f4e67;
      cursor: pointer;
      font: inherit;
    }
  </style>
</head>
<body>
  <main>
    <section class="card">
      <h1>Hardware / Runtime Ueberwachung</h1>
      <p>Client-Metriken (Browser) + API-Liveness des RAG-Backends.</p>
      <button id="refreshBtn" type="button">Aktualisieren</button>
    </section>

    <section class="card">
      <h2>Uebersicht</h2>
      <div class="grid">
        <div class="metric"><div class="k">API-Status</div><div id="apiStatus" class="v status">-</div></div>
        <div class="metric"><div class="k">API-Name</div><div id="apiService" class="v">-</div></div>
        <div class="metric"><div class="k">CPU-Kerne (Client)</div><div id="cpuCores" class="v">-</div></div>
        <div class="metric"><div class="k">RAM (Client, falls verfuegbar)</div><div id="clientRam" class="v">-</div></div>
        <div class="metric"><div class="k">Device Memory</div><div id="deviceMemory" class="v">-</div></div>
        <div class="metric"><div class="k">Netzwerktyp</div><div id="networkType" class="v">-</div></div>
      </div>
    </section>
  </main>

  <script>
    const API_BASE = window.LLM_API_BASE || `${window.location.protocol}//${window.location.hostname}:4100`;

    function setText(id, value) {
      const node = document.getElementById(id);
      if (node) node.textContent = value;
    }

    async function refresh() {
      setText('cpuCores', String(navigator.hardwareConcurrency || 'n/a'));
      setText('clientRam', performance && performance.memory ? `${Math.round(performance.memory.usedJSHeapSize / (1024 * 1024))} MB Heap` : 'n/a');
      setText('deviceMemory', navigator.deviceMemory ? `${navigator.deviceMemory} GB` : 'n/a');

      const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
      setText('networkType', conn?.effectiveType || 'n/a');

      try {
        const res = await fetch(`${API_BASE}/healthz`);
        const data = await res.json();
        const status = document.getElementById('apiStatus');
        if (res.ok && data?.ok) {
          status.textContent = 'OK';
          status.className = 'v status ok';
        } else {
          status.textContent = 'WARN';
          status.className = 'v status warn';
        }
        setText('apiService', data?.service || '-');
      } catch {
        const status = document.getElementById('apiStatus');
        status.textContent = 'OFFLINE';
        status.className = 'v status warn';
        setText('apiService', '-');
      }
    }

    document.getElementById('refreshBtn').addEventListener('click', refresh);
    refresh();
  </script>
</body>
</html>
